<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#030303" />
    <title>Poliplanner · Offline</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #030303; color: #f4f4f5; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 1.5rem; box-sizing: border-box; }
      main { max-width: 34rem; padding: 2rem; border: 1px solid #27272a; border-radius: 1.5rem; background: #111113; }
      h1 { margin: 0 0 .75rem; font-size: 1.5rem; }
      p { margin: 0; color: #a1a1aa; line-height: 1.6; }
      button { margin-top: 1.5rem; padding: .75rem 1rem; border: 0; border-radius: 999px; background: #a3e635; color: #111; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <h1>Poliplanner non è raggiungibile</h1>
      <p>I dati personali non vengono salvati nella cache del browser. Riconnettiti all’istanza per consultarli.</p>
      <button type="button" onclick="location.reload()">Riprova</button>
    </main>
  </body>
</html>
